<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather Frontend M3</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./assets/css/main.css" />
  </head>

  <body>
    <header class="weather-app__header">
      <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
          <a class="navbar-brand" href="index.html"> 🌤 Weather Frontend M3 </a>

          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
          >
            <span class="navbar-toggler-icon"></span>
          </button>

          <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
              <li class="nav-item">
                <a class="nav-link active" href="index.html">Inicio</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <main class="weather-app__content container py-5">
    <section class="weather-app__hero text-center mb-5">
  <h1 class="display-5 fw-bold">Clima en Chile</h1>

  <p class="lead">
    Consulta las condiciones climáticas de distintas ciudades del país.
  </p>
</section>

<section class="weather-app__search mb-5">
  <div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">
      <input
        type="text"
        class="form-control"
        placeholder="Buscar ciudad..."
      />
    </div>
  </div>
</section>

<section class="weather-app__results">
  <div
    id="citiesContainer"
    class="weather-app__cities row g-4"
  ></div>
</section>
    </main>

    <footer class="weather-app__footer bg-dark text-white text-center py-4">
      <div class="container">
        <p class="mb-1">Weather Frontend M3</p>
        <p class="mb-1">
          Aplicación de consulta climática de ciudades chilenas
        </p>
        <p class="mb-0">Franco Giaverini © 2026</p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

 <script src="./assets/js/data.js"></script>
<script src="./assets/js/apiClient.js"></script>
<script src="./assets/js/weatherApp.js"></script>
<script src="./assets/js/home.js"></script>
  </body>
</html>
